# Censo de Contingencia CVM - Apache reverse proxy vhost
# Colocar en /etc/apache2/sites-available/censo.conf
# Activar con: sudo a2ensite censo && sudo systemctl reload apache2
#
# Requiere módulos: proxy proxy_http ssl headers rewrite
# Habilitar con: sudo a2enmod proxy proxy_http ssl headers rewrite

<VirtualHost *:80>
    ServerName correspondencia.cvm.com.ve
    ServerAdmin admin@cvm.com.ve

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/censo-error.log
    CustomLog ${APACHE_LOG_DIR}/censo-access.log combined

    # Mantener el Host original (importante para que PM2 vea el dominio)
    ProxyPreserveHost On

    # Frontend estático servido por PM2 (censo-web en :3013)
    ProxyPass / http://127.0.0.1:3013/ retry=0
    ProxyPassReverse / http://127.0.0.1:3013/

    # API servida por PM2 (censo-api en :3012)
    # Esta regla va antes para que /api/ tenga prioridad sobre /
    # (aunque ProxyPass es first-match y la regla / ya está arriba, /api/ no
    #  colisiona porque ProxyPass / no captura subpaths ProxyPass explícitos)
    ProxyPass /api/ http://127.0.0.1:3012/api/ retry=0
    ProxyPassReverse /api/ http://127.0.0.1:3012/api/

    # Reenviar IP real del cliente a PM2
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-For "%{PROXY_REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"
</VirtualHost>

# Tras ejecutar certbot --apache, este bloque se duplica/modifica automáticamente
# como <VirtualHost *:443> con la configuración SSL. No editar manualmente.
